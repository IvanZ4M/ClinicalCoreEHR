<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Clinical Core EHR - Sistema de Gestión de Expedientes Clínicos" />
    <title>Clinical Core EHR - Centro Médico</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      /* Apply saved theme before first paint to avoid flash */
      (function() {
        var t = localStorage.getItem('cc.theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
        var h = localStorage.getItem('cc.accentH');
        if (h) document.documentElement.style.setProperty('--accent-h', h);
        var r = localStorage.getItem('cc.radius');
        if (r) document.documentElement.style.setProperty('--radius', r + 'px');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
